{% extends "base.html" %} {% block title %}Регистрация — FilmSwipe{% endblock %}
{% block content %}
<div class="auth-outer">
  <div class="auth-box">
    <h2>Регистрация</h2>
    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/auth/register">
      <div class="form-group">
        <label>Имя пользователя</label>
        <input
          type="text"
          name="username"
          required
          autofocus
          placeholder="username"
        />
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input
          type="password"
          name="password"
          required
          placeholder="Минимум 6 символов"
          minlength="6"
        />
      </div>
      <button
        type="submit"
        class="btn btn-dark"
        style="width: 100%; margin-top: 0.5rem"
      >
        Зарегистрироваться
      </button>
    </form>
    <div class="auth-link">
      Уже есть аккаунт? <a href="/auth/login">Войти</a>
    </div>
  </div>
</div>
{% endblock %}
