{% extends "base.html" %} {% block title %}Вход — FilmSwipe{% endblock %} {%
block content %}
<div class="auth-outer">
  <div class="auth-box">
    <h2>Вход в FilmSwipe</h2>
    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/auth/login">
      <div class="form-group">
        <label>Имя пользователя</label>
        <input
          type="text"
          name="username"
          required
          autofocus
          placeholder="username"
        />
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input
          type="password"
          name="password"
          required
          placeholder="••••••••"
        />
      </div>
      <button
        type="submit"
        class="btn btn-dark"
        style="width: 100%; margin-top: 0.5rem"
      >
        Войти
      </button>
    </form>
    <div class="auth-link">
      Нет аккаунта? <a href="/auth/register">Зарегистрироваться</a>
    </div>
  </div>
</div>
{% endblock %}
